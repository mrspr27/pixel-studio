<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجموعه پیکسل · تیمارستان</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
            background: #0c0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.5rem;
            transition: background 0.4s, color 0.3s;
        }
        body.light {
            background: #e8e2d4;
            color: #1a1628;
        }
        .pixel-wrapper {
            max-width: 100%;
            width: 100%;
            min-height: 98vh;
            background: rgba(18, 15, 34, 0.75);
            backdrop-filter: blur(8px);
            border: 3px solid #8a7cf0;
            border-radius: 40px;
            padding: 2rem 2.5rem 1.8rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), inset 0 0 30px rgba(120, 100, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: background 0.4s, border-color 0.3s;
            display: flex;
            flex-direction: column;
        }
        body.light .pixel-wrapper {
            background: rgba(240, 235, 220, 0.85);
            border-color: #6a5bb8;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.15);
        }

        /* animated pixel background */
        .pixel-bg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            opacity: 0.2;
        }
        .pixel-bg span {
            position: absolute;
            display: block;
            width: 30px;
            height: 30px;
            background: #7b6ef6;
            opacity: 0.12;
            animation: floatPixel 22s infinite alternate ease-in-out;
            border-radius: 6px;
            box-shadow: 0 0 20px #9b8cff;
        }
        .pixel-bg span:nth-child(1) { left: 5%; top: 8%; animation-duration: 24s; background: #f7b731; width: 40px; height: 40px; }
        .pixel-bg span:nth-child(2) { left: 85%; top: 75%; animation-duration: 20s; background: #ff6b8a; }
        .pixel-bg span:nth-child(3) { left: 15%; top: 90%; animation-duration: 26s; background: #4dd0e1; width: 34px; height: 34px; }
        .pixel-bg span:nth-child(4) { left: 75%; top: 12%; animation-duration: 18s; background: #b388ff; }
        .pixel-bg span:nth-child(5) { left: 45%; top: 45%; animation-duration: 30s; background: #ffd54f; width: 50px; height: 50px; }
        .pixel-bg span:nth-child(6) { left: 30%; top: 60%; animation-duration: 28s; background: #82b1ff; width: 22px; height: 22px; }
        @keyframes floatPixel {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(50px, -50px) rotate(15deg) scale(1.5); }
        }

        .content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ----- top bar ----- */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem 1.5rem;
            margin-bottom: 1.5rem;
        }
        .lang-group {
            display: flex;
            gap: 0.8rem;
        }
        .lang-btn {
            font-family: 'Press Start 2P', 'Vazirmatn', cursive;
            background: #25203f;
            border: 2px solid #6253c0;
            color: #cbc3ff;
            padding: 0.5rem 1.8rem;
            border-radius: 60px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 0 #1a1530;
            text-transform: uppercase;
        }
        .lang-btn.active {
            background: #7b6ef6;
            color: #0b0920;
            border-color: #b7acff;
            box-shadow: 0 4px 0 #4d3fb0;
            transform: scale(0.96);
        }
        .lang-btn:hover {
            background: #5c4ed6;
            color: white;
        }
        .theme-btn {
            background: #25203f;
            border: 2px solid #6253c0;
            color: #cbc3ff;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-family: 'Press Start 2P', 'Vazirmatn', cursive;
            font-size: 0.7rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #1a1530;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .theme-btn:hover {
            background: #5c4ed6;
            color: white;
        }
        body.light .lang-btn,
        body.light .theme-btn {
            background: #d8d0bc;
            border-color: #6a5bb0;
            color: #1d1735;
            box-shadow: 0 4px 0 #a395c0;
        }
        body.light .lang-btn.active {
            background: #7b6ef6;
            color: #0b0920;
            border-color: #b7acff;
            box-shadow: 0 4px 0 #4d3fb0;
        }

        /* header */
        .pixel-header {
            font-family: 'Press Start 2P', 'Vazirmatn', cursive;
            font-size: 2.4rem;
            text-align: center;
            color: #eee8ff;
            text-shadow: 5px 5px 0 #3d3280, 0 0 50px #7766f0;
            letter-spacing: 2px;
            word-break: break-word;
            padding-bottom: 0.6rem;
            border-bottom: 4px dashed #6b5ed6;
            margin-bottom: 1.8rem;
        }
        body.light .pixel-header {
            color: #1d1738;
            text-shadow: 4px 4px 0 #b3a6f0;
        }

        /* cards */
        .card-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 1.8rem;
            flex: 1;
        }
        .pixel-card {
            background: rgba(28, 24, 50, 0.75);
            backdrop-filter: blur(4px);
            border: 2.5px solid #6a5bd0;
            border-radius: 40px;
            padding: 1rem 1.8rem 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            transition: 0.25s;
            box-shadow: 0 6px 0 #1d1738;
            min-height: 72px;
            position: relative;
        }
        body.light .pixel-card {
            background: rgba(230, 223, 205, 0.8);
            border-color: #6b5bb0;
            box-shadow: 0 6px 0 #b3a3d0;
        }
        .pixel-card:hover {
            transform: translateY(-3px);
            border-color: #a89aff;
            box-shadow: 0 9px 0 #1d1738;
        }
        body.light .pixel-card:hover {
            box-shadow: 0 9px 0 #b3a3d0;
        }
        .card-title {
            font-family: 'Vazirmatn', 'Segoe UI', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            color: #f0ebff;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex: 1 1 200px;
            line-height: 1.5;
            flex-wrap: wrap;
        }
        body.light .card-title {
            color: #1d1738;
        }
        .card-title .pixel-icon {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.1rem;
            margin-left: 4px;
        }
        .card-title .en {
            font-family: 'Press Start 2P', 'Vazirmatn', cursive;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        .flag-emoji {
            font-size: 1.4rem;
            line-height: 1;
            flex-shrink: 0;
        }
        .lang-badge {
            font-family: 'Press Start 2P', 'Vazirmatn', cursive;
            font-size: 0.5rem;
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            border: 1.5px solid rgba(255,255,255,0.15);
            color: #cbc3ff;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        body.light .lang-badge {
            background: rgba(0,0,0,0.06);
            border-color: rgba(0,0,0,0.1);
            color: #3d356b;
        }
        .lang-badge.persian {
            border-color: #4dd0e1;
            color: #4dd0e1;
        }
        body.light .lang-badge.persian {
            border-color: #00897b;
            color: #00897b;
        }
        .lang-badge.english {
            border-color: #ff6b8a;
            color: #ff6b8a;
        }
        body.light .lang-badge.english {
            border-color: #c62848;
            color: #c62848;
        }
        .lang-badge.both {
            border-color: #ffb74d;
            color: #ffb74d;
            display: flex;
            gap: 0.3rem;
        }
        body.light .lang-badge.both {
            border-color: #e69a2e;
            color: #e69a2e;
        }

        .join-btn {
            background: #7b6ef6;
            border: none;
            border-radius: 60px;
            padding: 0.5rem 1.6rem;
            font-family: 'Press Start 2P', 'Vazirmatn', cursive;
            font-weight: bold;
            color: #0b0820;
            border-bottom: 4px solid #45389e;
            cursor: pointer;
            transition: 0.08s linear;
            font-size: 0.7rem;
            box-shadow: 0 4px 0 #2d2370;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            min-width: 90px;
            justify-content: center;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }
        .join-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .join-btn:hover {
            background: #9589ff;
        }

        /* highlighted card (IDK groups) - soft glow instead of heavy animation */
        .highlight-card {
            border-color: #ffb74d;
            box-shadow: 0 6px 0 #b86e1a, 0 0 20px rgba(255, 183, 77, 0.25);
        }
        body.light .highlight-card {
            border-color: #e69a2e;
            box-shadow: 0 6px 0 #a06f20, 0 0 20px rgba(255, 183, 77, 0.2);
        }
        .highlight-card:hover {
            box-shadow: 0 9px 0 #b86e1a, 0 0 35px rgba(255, 183, 77, 0.35);
        }
        body.light .highlight-card:hover {
            box-shadow: 0 9px 0 #a06f20, 0 0 35px rgba(255, 183, 77, 0.3);
        }
        .highlight-card .join-btn {
            background: #ffb74d;
            border-bottom: 4px solid #b86e1a;
            box-shadow: 0 4px 0 #8a5200;
            color: #1f1600;
        }
        .highlight-card .join-btn:hover {
            background: #ffcc80;
        }

        /* pinned card - soft glow */
        .pinned-card {
            border-color: #ff6b8a;
            box-shadow: 0 6px 0 #b84a5e, 0 0 25px rgba(255, 107, 138, 0.2);
        }
        body.light .pinned-card {
            border-color: #d45a78;
            box-shadow: 0 6px 0 #a04358, 0 0 25px rgba(255, 107, 138, 0.2);
        }
        .pinned-card:hover {
            box-shadow: 0 9px 0 #b84a5e, 0 0 40px rgba(255, 107, 138, 0.3);
        }
        body.light .pinned-card:hover {
            box-shadow: 0 9px 0 #a04358, 0 0 40px rgba(255, 107, 138, 0.3);
        }
        .pinned-card .join-btn {
            background: #ff6b8a;
            border-bottom: 4px solid #b84a5e;
            box-shadow: 0 4px 0 #8a3550;
            color: #1a0610;
        }
        .pinned-card .join-btn:hover {
            background: #ff8aa3;
        }

        /* subtle text inside pinned card */
        .pinned-sub {
            position: absolute;
            bottom: 4px;
            right: 2rem;
            font-size: 0.55rem;
            opacity: 0.35;
            color: #cbc3ff;
            font-family: 'Press Start 2P', 'Vazirmatn', cursive;
            letter-spacing: 0.3px;
        }
        body.light .pinned-sub {
            color: #3d356b;
        }

        .footer {
            text-align: center;
            margin-top: 1.2rem;
            color: #7f76b0;
            font-size: 0.85rem;
            opacity: 0.6;
            font-family: 'Vazirmatn', 'Segoe UI', sans-serif;
            letter-spacing: 0.5px;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        body.light .footer {
            color: #3e356b;
            border-top-color: rgba(0,0,0,0.05);
        }

        @media (max-width: 620px) {
            .pixel-wrapper { padding: 1.2rem 1rem; border-radius: 28px; }
            .pixel-header { font-size: 1.6rem; }
            .pixel-card { padding: 0.8rem 1.2rem; min-height: 60px; gap: 0.6rem; }
            .join-btn { min-width: 70px; font-size: 0.6rem; padding: 0.4rem 1rem; }
            .card-title { font-size: 1rem; flex: 1 1 140px; }
            .top-bar { flex-direction: row; flex-wrap: wrap; gap: 0.5rem; }
            .lang-btn { font-size: 0.55rem; padding: 0.3rem 1rem; }
            .theme-btn { font-size: 0.55rem; padding: 0.3rem 0.8rem; }
            .flag-emoji { font-size: 1.2rem; }
            .lang-badge { font-size: 0.4rem; padding: 0.1rem 0.5rem; }
            .pinned-sub { font-size: 0.45rem; right: 1.2rem; bottom: 3px; }
        }
        @media (max-width: 450px) {
            .pixel-wrapper { padding: 0.8rem 0.6rem; border-radius: 20px; }
            .pixel-header { font-size: 1.2rem; }
            .card-title { font-size: 0.85rem; }
            .join-btn { font-size: 0.5rem; min-width: 55px; padding: 0.3rem 0.6rem; }
            .flag-emoji { font-size: 1rem; }
            .lang-badge { font-size: 0.35rem; padding: 0.05rem 0.4rem; }
            .pinned-sub { font-size: 0.4rem; right: 0.8rem; bottom: 2px; }
        }
    </style>
</head>
<body>
    <div class="pixel-wrapper" id="app">
        <div class="pixel-bg">
            <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="content">
            <!-- top bar -->
            <div class="top-bar">
                <div class="lang-group">
                    <button class="lang-btn active" data-lang="fa" id="langFa">🇮🇷 فارسی</button>
                    <button class="lang-btn" data-lang="en" id="langEn">🇬🇧 English</button>
                </div>
                <button class="theme-btn" id="themeToggle">🌓 تم</button>
            </div>

            <!-- header -->
            <h1 class="pixel-header" id="mainTitle">مجموعهٔ پیکسل</h1>

            <!-- cards -->
            <div class="card-grid" id="cardContainer"></div>

            <div class="footer" id="footerCredit">مالک @itsspr27</div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- data with new pinned card ----------
            const data = {
                fa: {
                    title: 'مجموعهٔ پیکسل',
                    cards: [
                        { 
                            label: 'pixel gem studio', 
                            link: 'https://t.me/pixel_gem_studio', 
                            flag: '🇺🇸', 
                            lang: 'english', 
                            pinned: true,
                            subtitle: 'کد حذف تبلیغ اینجاست'
                        },
                        { label: 'گروه عا نمیدانم تلگرام', link: 'https://t.me/+1tLJ3e2tvIs3YWY0', flag: '🇮🇷🇺🇸', lang: 'both' },
                        { label: 'کانال تیمارستان پیکسلی روبیکا', link: 'https://rubika.ir/joinc/CJCIEHGA0QSRNAMRRAQIXPZFLWABGPOZ', flag: '🇮🇷', lang: 'persian' },
                        { label: 'پیکسل گیف روبیکا', link: 'https://rubika.ir/joinc/EGDEIICB0SSMRFGCWKPLXWXLHPZYBCXZ', flag: '🇮🇷', lang: 'persian' },
                        { label: 'گروه عا نمیدانم روبیکا', link: 'https://rubika.ir/joing/+BAFABIJID0XTGYKISOYDNVWJPHQZLGNK', flag: '🇮🇷', lang: 'persian' },
                        { label: 'پیکسل گیف تلگرام', link: 'https://t.me/pixel_gifit', flag: '🇮🇷', lang: 'persian' }
                    ],
                    footer: 'مالک @itsspr27',
                    joinText: '🎮 جوین'
                },
                en: {
                    title: 'Pixel Collection',
                    cards: [
                        { 
                            label: 'pixel gem studio', 
                            link: 'https://t.me/pixel_gem_studio', 
                            flag: '🇺🇸', 
                            lang: 'english', 
                            pinned: true,
                            subtitle: 'ad removal code is here'
                        },
                        { label: 'IDK Group Telegram', link: 'https://t.me/+1tLJ3e2tvIs3YWY0', flag: '🇮🇷🇺🇸', lang: 'both' },
                        { label: 'Pixel Asylum Rubika', link: 'https://rubika.ir/joinc/CJCIEHGA0QSRNAMRRAQIXPZFLWABGPOZ', flag: '🇮🇷', lang: 'persian' },
                        { label: 'Pixel GIF Rubika', link: 'https://rubika.ir/joinc/EGDEIICB0SSMRFGCWKPLXWXLHPZYBCXZ', flag: '🇮🇷', lang: 'persian' },
                        { label: 'IDK Group Rubika', link: 'https://rubika.ir/joing/+BAFABIJID0XTGYKISOYDNVWJPHQZLGNK', flag: '🇮🇷', lang: 'persian' },
                        { label: 'Pixel GIF Telegram', link: 'https://t.me/pixel_gifit', flag: '🇮🇷', lang: 'persian' }
                    ],
                    footer: 'owner @itsspr27',
                    joinText: '🎮 Join'
                }
            };

            // state
            let currentLang = 'fa';
            let currentTheme = 'dark';

            // DOM refs
            const mainTitle = document.getElementById('mainTitle');
            const cardContainer = document.getElementById('cardContainer');
            const footerCredit = document.getElementById('footerCredit');
            const langFa = document.getElementById('langFa');
            const langEn = document.getElementById('langEn');
            const themeToggle = document.getElementById('themeToggle');

            // get language badge HTML
            function getLangBadge(lang) {
                if (!lang) return '';
                if (lang === 'persian') {
                    return `<span class="lang-badge persian">PERSIAN</span>`;
                } else if (lang === 'english') {
                    return `<span class="lang-badge english">ENGLISH</span>`;
                } else if (lang === 'both') {
                    return `<span class="lang-badge both">PERSIAN · ENGLISH</span>`;
                }
                return '';
            }

            // ---------- render cards ----------
            function renderCards(lang) {
                const langData = data[lang];
                if (!langData) return;
                const cards = langData.cards;
                const joinText = langData.joinText;
                
                // sort: pinned first
                const sorted = [...cards].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

                let html = '';
                sorted.forEach((card, idx) => {
                    const isHighlight = card.label.includes('عا نمیدانم') || card.label.includes('IDK Group');
                    const isPinned = card.pinned === true;
                    
                    let classes = 'pixel-card';
                    if (isHighlight) classes += ' highlight-card';
                    if (isPinned) classes += ' pinned-card';
                    
                    const flagHtml = card.flag ? `<span class="flag-emoji">${card.flag}</span>` : '';
                    const badgeHtml = getLangBadge(card.lang);
                    const subtitleHtml = card.subtitle ? `<span class="pinned-sub">${card.subtitle}</span>` : '';
                    
                    html += `
                        <div class="${classes}" data-card-index="${idx}">
                            <span class="card-title">${flagHtml} ${card.label} ${badgeHtml}</span>
                            <button class="join-btn" data-link="${card.link}">
                                ${joinText}
                            </button>
                            ${subtitleHtml}
                        </div>
                    `;
                });
                cardContainer.innerHTML = html;

                // update footer and title
                footerCredit.textContent = langData.footer;
                mainTitle.textContent = langData.title;

                // attach click listeners
                document.querySelectorAll('.pixel-card .join-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const link = this.getAttribute('data-link');
                        if (link && link !== '#') {
                            window.open(link, '_blank');
                        }
                    });
                });
            }

            // ---------- switch language ----------
            function setLanguage(lang) {
                currentLang = lang;
                langFa.classList.toggle('active', lang === 'fa');
                langEn.classList.toggle('active', lang === 'en');
                document.documentElement.dir = lang === 'fa' ? 'rtl' : 'ltr';
                document.documentElement.lang = lang;
                renderCards(lang);
            }

            // ---------- theme toggle ----------
            function toggleTheme() {
                const body = document.body;
                if (currentTheme === 'dark') {
                    body.classList.add('light');
                    currentTheme = 'light';
                } else {
                    body.classList.remove('light');
                    currentTheme = 'dark';
                }
            }

            // ---------- init ----------
            function init() {
                setLanguage('fa');
                document.body.classList.remove('light');
                currentTheme = 'dark';
                langFa.addEventListener('click', function() { setLanguage('fa'); });
                langEn.addEventListener('click', function() { setLanguage('en'); });
                themeToggle.addEventListener('click', toggleTheme);
            }

            init();
        })();
    </script>
</body>
</html>
